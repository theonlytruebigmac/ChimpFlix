name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  REGISTRY: ghcr.io
  # Image base path. Final names become:
  #   ghcr.io/<owner>/chimpflix/server
  #   ghcr.io/<owner>/chimpflix/web
  IMAGE_BASE: ${{ github.repository_owner }}/chimpflix

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  image:
    name: Image (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [rust, web]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [server, web]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      # Authenticate only when we're going to push. Pull-request runs
      # build to verify but don't publish, so they don't need creds.
      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate the right tag list for the event:
      #   push to main         → :latest, :main-<short-sha>
      #   push to a v* tag     → :1.2.3, :1.2, :latest
      #   pull_request         → no push tags (build verify only)
      - name: Compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=main-,format=short,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build${{ github.event_name == 'push' && ' and push' || '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,scope=${{ matrix.target }},mode=max

  # Boots the freshly built server image and verifies it answers
  # `/health` before declaring the build releasable. Catches:
  #   * Migration errors against a fresh data dir.
  #   * Missing env defaults (the image won't boot without them).
  #   * ffmpeg binary missing from the image.
  # See `docs/PUBLIC_RELEASE_HARDENING.md` Tier 0 item 0.8 + Tier 1
  # item #2 (the `/ready` endpoint, which this job should switch to
  # once it lands).
  smoke:
    name: Smoke (server image)
    runs-on: ubuntu-latest
    needs: [image]
    # Only run when image was actually pushed (push events) so we can
    # pull by tag. On PRs the image is built but not pushed.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Determine image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "ref=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi
      - name: Boot server image against fresh data dir
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/server:${{ steps.tag.outputs.ref }}
        run: |
          mkdir -p ./smoke-data
          docker pull "$IMAGE"
          docker run -d --rm \
            --name chimpflix-smoke \
            -p 18080:8080 \
            -e DATA_DIR=/data \
            -e CHIMPFLIX_ALLOW_PLAINTEXT_VAULT=1 \
            -v "$PWD/smoke-data:/data" \
            "$IMAGE"
          # Wait up to 60s for /health.
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/api/v1/ready >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 2
          done
          docker logs chimpflix-smoke | tail -200
          docker stop chimpflix-smoke || true
          test "$ok" = "1" || { echo "::error::server did not answer /health within 60s"; exit 1; }
          # Migration smoke: the data dir should now contain a non-empty
          # chimpflix.db, signalling at least one migration applied.
          test -s ./smoke-data/chimpflix.db || { echo "::error::chimpflix.db missing or empty after boot"; exit 1; }

      # Migration matrix: for tagged releases only, boot the *previous*
      # release's image first to seed an older schema, then boot the new
      # image against the same data dir to prove the upgrade migrations
      # apply cleanly. Skipped on the very first release (no prior tag).
      - name: Migration matrix (previous release → this release)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NEW_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/server:${{ steps.tag.outputs.ref }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --match 'v*' HEAD^ 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No prior v* tag found — first release, skipping migration matrix."
            exit 0
          fi
          PREV_VER="${PREV_TAG#v}"
          PREV_IMAGE="${REGISTRY}/${IMAGE_BASE}/server:${PREV_VER}"
          echo "Replaying $PREV_IMAGE → $NEW_IMAGE"
          mkdir -p ./migrate-data
          docker pull "$PREV_IMAGE"
          docker run -d --rm \
            --name chimpflix-migrate-old \
            -e DATA_DIR=/data \
            -e CHIMPFLIX_ALLOW_PLAINTEXT_VAULT=1 \
            -v "$PWD/migrate-data:/data" \
            "$PREV_IMAGE"
          # Give the old image time to apply its full migration set.
          sleep 20
          docker logs chimpflix-migrate-old | tail -50
          docker stop chimpflix-migrate-old || true
          # Now boot the new image against the same data dir.
          docker run -d --rm \
            --name chimpflix-migrate-new \
            -p 18081:8080 \
            -e DATA_DIR=/data \
            -e CHIMPFLIX_ALLOW_PLAINTEXT_VAULT=1 \
            -v "$PWD/migrate-data:/data" \
            "$NEW_IMAGE"
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18081/api/v1/ready >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 2
          done
          docker logs chimpflix-migrate-new | tail -200
          docker stop chimpflix-migrate-new || true
          test "$ok" = "1" || {
            echo "::error::upgrade from $PREV_TAG failed — migrations did not apply cleanly";
            exit 1;
          }

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [image, smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # GitHub auto-generates release notes from the commits since the
      # previous tag. Body references the published images so the
      # Release page is a one-stop "what shipped + how to pull it".
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          IMAGE_SERVER: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/server
          IMAGE_WEB: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/web
        run: |
          VERSION="${TAG#v}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --notes "## Images

          \`\`\`
          docker pull $IMAGE_SERVER:$VERSION
          docker pull $IMAGE_WEB:$VERSION
          \`\`\`

          Also published as \`:latest\` and \`:${VERSION%.*}\`.
          "

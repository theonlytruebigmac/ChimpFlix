# ChimpFlix — two-service compose.
#
# Quick start:
#   cp .env.example .env.local            # then fill in values
#   mkdir -p ./data
#   docker compose up -d --build
#   open http://localhost:3000
#
# The `server` container is the Rust backend (API + WebSocket + transcoder).
# The `web` container is the Next.js UI. They communicate over the
# default compose network and both read `./.env.local` via `env_file:`.

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: server
    image: chimpflix-server:local
    container_name: chimpflix-server
    restart: unless-stopped
    env_file:
      - path: ./.env.local
        required: false
    environment:
      TZ: America/Kentucky/Louisville
      BIND_ADDR: 0.0.0.0:8080
      DATA_DIR: /data
      RUST_LOG: info,sqlx=warn
      # NVIDIA Container Toolkit hints. `video` enables NVENC, `compute`
      # is required for the libcuda init the encoder does internally,
      # `utility` lets ffmpeg call into nvidia-smi for capability probing.
      # Without these, the NVENC libraries are installed in the container
      # but can't find the host driver and fail at session start.
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "/etc/timezone:/etc/timezone:ro"
      - ./data:/data
      # Mount your media here (read-only is recommended).
      - /mnt/archive:/media
    # IMPORTANT — choose the right bind for your topology:
    #
    #   * Same-host Traefik (shared docker network): remove the `ports:`
    #     block entirely. Traefik reaches the container via the compose
    #     network (`http://server:8080`); no host port needed.
    #
    #   * Same-host Traefik with a host-port shim: bind to loopback to
    #     keep the port off the public interface:
    #         ports: ["127.0.0.1:8080:8080"]
    #
    #   * Cross-host Traefik (CURRENT SETUP): keep the wide bind so the
    #     Traefik machine can reach this host's LAN IP at :8080. **You
    #     MUST restrict :8080 with a host firewall** (ufw / iptables /
    #     nftables) to only accept connections from the Traefik host's
    #     LAN IP — otherwise the origin is reachable from any device on
    #     the LAN that knows this machine's address, bypassing
    #     Cloudflare entirely. Example ufw rule:
    #         sudo ufw allow from <traefik-host-ip> to any port 8080 proto tcp
    #         sudo ufw deny  in to any port 8080 proto tcp
    ports:
      - "8080:8080"
    # Container hardening. None of these break NVENC/VAAPI; ffmpeg only
    # needs `cap_sys_nice` for `nice -n` (we use the `nice` binary
    # already, which doesn't need elevated caps).
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Process/thread ceiling. Bumped from 512 → 4096 because the
    # media workload is fundamentally thread-heavy: each ffmpeg
    # invocation spawns a stderr-capture thread, tacet's rayon
    # pool defaults to `num_cpus`, and 4 concurrent job workers
    # each running `detect_markers_file` + an in-flight
    # `bootstrap_season_refs` (which decodes every episode of a
    # season in parallel) easily blow through 512 — surfacing as
    # "task panicked: failed to spawn thread: Resource temporarily
    # unavailable (os error 11 / EAGAIN)" in the job queue. 4096
    # still bounds fork-bomb risk but matches the real workload's
    # peak demand on a 4–8 core host.
    pids_limit: 4096
    # Disable kernel-mediated mount/CHROOT etc. Apparmor profile
    # `docker-default` is implicit on Ubuntu/Debian hosts.
    # GPU passthrough. Pick one (or both — different runtime keys,
    # they coexist) depending on the host hardware:
    #
    # ── NVIDIA (NVENC / NVDEC) ──────────────────────────────────
    # Requires `nvidia-container-toolkit` on the host + the docker
    # daemon configured to know about the `nvidia` runtime
    # (`nvidia-ctk runtime configure --runtime=docker` + restart).
    # Without those host-side prerequisites the deploy block below
    # is a no-op and the container falls back to CPU encoding —
    # the in-process smoke test detects this at startup and drops
    # NVENC from the admin UI's encoder list automatically.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    #
    # ── AMD / Intel (VAAPI + Quick Sync) ────────────────────────
    # Mount the DRI render node from the host. The `mesa-va-drivers`
    # and `intel-media-va-driver-non-free` packages baked into the
    # image provide the userspace; the kernel side comes from the
    # host (amdgpu / i915). Uncomment to enable. `card0` is for
    # render-node-less older drivers; `renderD128` is the modern
    # path and what our VAAPI hint uses.
    # devices:
    #   - /dev/dri/renderD128:/dev/dri/renderD128
    #   - /dev/dri/card0:/dev/dri/card0
    # group_add:
    #   - "video"   # operator host's `video` group GID, usually 44
    #   - "render"  # newer distros split out renderD* into a 'render' group, usually 109
    # /api/v1/ready (BLOCK #2) probes the DB pool, ffmpeg binary, and
    # vault decrypt before reporting healthy — so the proxy doesn't
    # route real traffic at a partially-broken server. `/health` is
    # the cheap "process is alive" probe; keep it for upstream load
    # balancers that need a sub-millisecond response.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
      # Build-time args. NEXT_PUBLIC_* + APP_PUBLIC_ORIGIN are baked into
      # the client bundle; runtime changes via env_file won't take effect
      # until the image is rebuilt (`docker compose build web`).
      args:
        CHIMPFLIX_API_URL: http://server:8080
        NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-ChimpFlix}
        NEXT_PUBLIC_BRAND_NAME_UPPER: ${NEXT_PUBLIC_BRAND_NAME_UPPER:-}
        APP_PUBLIC_ORIGIN: ${APP_PUBLIC_ORIGIN:-}
        NEXT_PUBLIC_CAST_RECEIVER_APP_ID: ${NEXT_PUBLIC_CAST_RECEIVER_APP_ID:-}
    image: chimpflix-web:local
    container_name: chimpflix-web
    restart: unless-stopped
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "/etc/timezone:/etc/timezone:ro"
    depends_on:
      # `service_healthy` (not just `service_started`) so Next.js doesn't
      # boot until the Rust API is actually accepting connections. Next
      # is "Ready in 0ms" but the server still has migrations + the
      # scheduler bring-up to do — without this gate the first 10-30 s
      # of frontend requests proxy through to a not-listening port and
      # the log fills with `ECONNREFUSED 172.x.x.x:8080`. The server
      # already declares a `/health` healthcheck above; this just
      # consumes it.
      server:
        condition: service_healthy
    env_file:
      - path: ./.env.local
        required: false
    environment:
      # Runtime endpoint for /api/v1/* rewrites in next.config.ts.
      CHIMPFLIX_API_URL: http://server:8080
      TZ: America/Kentucky/Louisville
    # See the matching comment on the `server` service. For the
    # cross-host setup (Traefik on another machine), keep the wide
    # bind so Traefik can reach this host's LAN IP at :3000, and add
    # a host firewall rule to restrict :3000 to the Traefik host IP.
    # For same-host Traefik, switch to 127.0.0.1:3000:3000 (or remove
    # the block entirely and let the compose network handle it).
    ports:
      - "3000:3000"
    init: true            # docker-managed tini equivalent so Next.js
                          # (PID 1) sees SIGTERM and reaps any child
                          # processes the Next runtime spawns.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256

# ChimpFlix — two-service compose.
#
# Quick start:
#   mkdir -p ./data
#   docker compose up -d --build
#   open http://localhost:3000
#
# The `server` container is the Rust backend (API + WebSocket + transcoder).
# The `web` container is the Next.js Netflix-style UI. They communicate
# over the default compose network.
#
# Until Phase 2 (frontend wired to the new backend), the web container
# still talks to a Plex server using the env vars in ./web/.env.local
# (see ./web/.env.example).

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: server
    image: chimpflix-server:local
    container_name: chimpflix-server
    restart: unless-stopped
    environment:
      BIND_ADDR: 0.0.0.0:8080
      DATA_DIR: /data
      RUST_LOG: info,sqlx=warn
    volumes:
      - ./data:/data
      # Mount your media here (read-only is recommended).
      # - /path/to/movies:/media/movies:ro
      # - /path/to/shows:/media/shows:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
    image: chimpflix-web:local
    container_name: chimpflix-web
    restart: unless-stopped
    depends_on:
      - server
    env_file:
      - path: ./web/.env.local
        required: false
    environment:
      # Endpoint the frontend will use once Phase 2 lands.
      CHIMPFLIX_API_URL: http://server:8080
    ports:
      - "3000:3000"
